<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <title>SignalGrip Radar</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; background: #007bff; color: white; width: 100%; margin-bottom: 15px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #disconnectBtn { background: #dc3545; display: none; }
        .status { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .status.disconnected { background: #ffeeba; color: #856404; }
        .status.connected { background: #d4edda; color: #155724; }
        .data-box { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #dee2e6; }
        .data-row { margin-bottom: 8px; font-size: 16px; }
        .timestamp { font-size: 12px; color: #6c757d; margin-top: 15px; text-align: right; }
    </style>

</head>
<body>

<div class="container">
    <h2>SignalGrip Radar</h2>
    
    <div id="statusBadge" class="status disconnected">Status: Terputus</div>

    <button id="connectBtn">Mulai Scan & Hubungkan</button>
    <button id="disconnectBtn">Putuskan Koneksi</button>
    <button id="installBtn" style="display: none; background-color: #28a745;">
        Download Aplikasi SAR 
    </button>

    <div class="data-box">
        <div class="data-row"><strong>Nama:</strong> <span id="valNama">Menunggu data...</span></div>
        <div class="data-row"><strong>ID:</strong> <span id="valId">-</span></div>
        <div class="data-row"><strong>Latitude:</strong> <span id="valLat">-</span></div>
        <div class="data-row"><strong>Longitude:</strong> <span id="valLon">-</span></div>
        <div class="data-row"><strong>Peta:</strong> <a id="mapsLink" href="#" target="_blank" style="display:none; color:#007bff; font-weight:bold; text-decoration:none;">📍 Buka di Google Maps</a></div>        <div class="timestamp" id="valTime">Terakhir update: -</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
